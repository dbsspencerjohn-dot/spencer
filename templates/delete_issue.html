{% extends "base.html" %} {% block title %} Delete Issue {% endblock %} {% block
content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-danger text-white">
        <h4>Delete Vulnerability</h4>
      </div>

      <div class="card-body">
        <p>Are you sure you want to delete this issue?</p>

        <hr />

        <p>
          <strong>Title:</strong>

          {{ issue.title }}
        </p>

        <p>
          <strong>Severity:</strong>

          {{ issue.severity }}
        </p>

        <p>
          <strong>Status:</strong>

          {{ issue.status }}
        </p>

        <p>This action cannot be undone.</p>

        <form method="POST">
          <button type="submit" class="btn btn-danger">Delete Issue</button>

          <a href="/issues-page" class="btn btn-secondary"> Cancel </a>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
