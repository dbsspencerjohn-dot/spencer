{% extends "base.html" %} {% block title %} Create Issue {% endblock %} {% block
content %}

<h2 class="mb-4">Create New Vulnerability</h2>

<form method="POST">
  <div class="mb-3">
    <label class="form-label"> Title </label>

    <input type="text" name="title" class="form-control" required />
  </div>

  <div class="mb-3">
    <label class="form-label"> Description </label>

    <textarea
      name="description"
      class="form-control"
      rows="4"
      required
    ></textarea>
  </div>

  <div class="row">
    <div class="col-md-6">
      <label class="form-label"> Severity </label>

      <select name="severity" class="form-select">
        <option>Low</option>

        <option>Medium</option>

        <option>High</option>

        <option selected>Critical</option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label"> Status </label>

      <select name="status" class="form-select">
        <option selected>Open</option>

        <option>In Progress</option>

        <option>Resolved</option>

        <option>Closed</option>
      </select>
    </div>
  </div>

  <br />

  <div class="mb-3">
    <label class="form-label"> Reporter </label>

    <input type="text" name="reporter" class="form-control" required />
  </div>

  <div class="mb-3">
    <label class="form-label"> Assigned To </label>

    <input type="text" name="assigned_to" class="form-control" required />
  </div>

  <div class="mb-3">
    <label class="form-label"> Affected System </label>

    <input type="text" name="affected_system" class="form-control" required />
  </div>

  <div class="mb-3">
    <label class="form-label"> CVSS Score </label>

    <input
      type="number"
      step="0.1"
      min="0"
      max="10"
      name="cvss_score"
      class="form-control"
      required
    />
  </div>

  <button type="submit" class="btn btn-success">Save Issue</button>

  <a href="/issues-page" class="btn btn-secondary"> Cancel </a>
</form>

{% endblock %}
